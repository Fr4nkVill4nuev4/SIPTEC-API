spring.application.name=SPITEC

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.driver-class-name=${DB_DRIVER:oracle.jdbc.OracleDriver}
spring.datasource.username=${DB_USER:${DB_USERNAME:SIPTEC}}
spring.datasource.password=${DB_PASSWORD:SIPTEC}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.OracleDialect}

server.port=${DB_PORT:8080}
